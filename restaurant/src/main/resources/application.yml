server:
  port: 9101

spring:
  profiles:
    active: dev
  application:
    name: restaurant-service
  datasource:
#    url: jdbc:postgresql://localhost:5432/delivery_eum
    url: jdbc:postgresql://localhost:5432/delivery_eum?reWriteBatchedInserts=true
    username: hyuk
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true