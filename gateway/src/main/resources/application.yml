server:
  port: 8000

spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins: "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
          httpclient:
            pool:
              type: elastic
              max-connections: 200
              max-idle-time: 10000
            connect-timeout: 1000
            response-timeout: 30s
          routes:
            # 주문 웹소켓
            - id: order-ws
              uri: http://localhost:9100
              predicates:
                - Path=/ws/order
              filters:
                - AuthenticationFilter
            # 주문
            - id: order-service
              uri: http://localhost:9100
              predicates:
                - Path=/order-service/**
              filters:
                - AuthenticationFilter
            # 음식점
            - id: restaurant-service
              uri: http://localhost:9101
              predicates:
                - Path=/restaurant-service/**
            # 회원 (인증X)
            - id: user-public
              uri: http://localhost:9099
              predicates:
                - Path=/login/**, /oauth2/**, /auth/**, /dummy/**
            # 회원
            - id: user-service
              uri: http://localhost:9099
              predicates:
                - Path=/user-service/**
              filters:
                - AuthenticationFilter
            # 결제
            - id: pay-service
              uri: http://localhost:9094
              predicates:
                - Path=/pay-service/**
              filters:
                - AuthenticationFilter
            # 배달 웹소켓
            - id: rider-ws
              uri: http://localhost:9095
              predicates:
                - Path=/ws/rider
              filters:
                - AuthenticationFilter
            # 배달 기사
            - id: rider-service
              uri: http://localhost:9095
              predicates:
                - Path=/rider-service/**
              filters:
                - AuthenticationFilter
            # 정산
            - id: settlement-service
              uri: http://localhost:9096
              predicates:
                - Path=/settlement-service/**
              filters:
                - AuthenticationFilter
            # 판매자 웹소켓
            - id: seller-ws
              uri: http://localhost:9098
              predicates:
                - Path=/ws/seller
              filters:
                - AuthenticationFilter
            # 판매자
            - id: seller-service
              uri: http://localhost:9098
              predicates:
                - Path=/seller-service/**
              filters:
                - AuthenticationFilter
            # 위치
            - id: location-service
              uri: http://localhost:9102
              predicates:
                - Path=/location-service/**

springdoc:
  swagger-ui:
    urls:
      - name: 01. 주문 (Order)
        url: /order-service/v3/api-docs
      - name: 02. 음식점 (Restaurant)
        url: /restaurant-service/v3/api-docs
      - name: 03. 회원 (User)
        url: /user-service/v3/api-docs
      - name: 04. 결제 (Pay)
        url: /pay-service/v3/api-docs
      - name: 05. 배달기사 (Rider)
        url: /rider-service/v3/api-docs
      - name: 06. 정산 (Settlement)
        url: /settlement-service/v3/api-docs
      - name: 07. 판매자 (Seller)
        url: /seller-service/v3/api-docs
    persist-authorization: true
  api-docs:
    path: /v3/api-docs
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    gateway:
      access: none

