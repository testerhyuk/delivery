server:
  port: 9094

spring:
  profiles:
    active: dev
  application:
    name: pay-service
  threads:
    virtual:
      enabled: true
  datasource:
    hikari:
      maximum-pool-size: 80
      minimum-idle: 50
      connection-timeout: 30000
      leak-detection-threshold: 5000
    url: jdbc:postgresql://localhost:5432/delivery_eum
    username: hyuk
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        session:
          events:
            logging:
              slow_query_threshold: 100

logging:
  level:
    com.zaxxer.hikari: TRACE

